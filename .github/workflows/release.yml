# Tier 2 — kill the irreversible-action risk.
#
# Tag a release with `git tag v0.5.0 && git push --tags`. This workflow:
#   1. Reruns the test suite (last gate before publish).
#   2. Builds the wheel + sdist with `python -m build`.
#   3. Publishes to PyPI via Trusted Publishing (OIDC — no API token).
#   4. Creates a GitHub Release with the matching CHANGELOG.md section.
#
# One-time PyPI setup (do this BEFORE pushing the first tag):
#   1. Go to https://pypi.org/manage/project/archit-app/settings/publishing/
#   2. Add a new "GitHub Actions" Trusted Publisher with:
#        Owner:           archit-app
#        Repository name: archit-app
#        Workflow name:   release.yml
#        Environment:     pypi          (matches `environment:` below)
#   3. Save. From then on, this workflow can publish without an API token.
#
# Tag must match `v<version>` and `version` in pyproject.toml exactly.
# The job will FAIL if they disagree — that's a feature.
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,io,ifc,image,pdf,analysis]"
      - run: pytest -q

  build:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify tag matches pyproject version
        id: version
        run: |
          TAG="${GITHUB_REF##refs/tags/v}"
          PROJ=$(grep -E '^version *= *"' pyproject.toml | head -1 | cut -d'"' -f2)
          if [ "$TAG" != "$PROJ" ]; then
            echo "Tag v$TAG does not match pyproject version $PROJ" >&2
            exit 1
          fi
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/p/archit-app
    permissions:
      id-token: write    # required for PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: [build, publish]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write    # required to create a Release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Extract CHANGELOG section for v${{ needs.build.outputs.version }}
        id: notes
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          # Pull lines from "## $VERSION" (inclusive) to the next "## " (exclusive).
          awk -v v="## $VERSION" '
            $0 ~ "^"v {flag=1; next}
            /^## / && flag {exit}
            flag {print}
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "Release v$VERSION — see CHANGELOG.md for details." > release_notes.md
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: v${{ needs.build.outputs.version }}
          body_path: release_notes.md
          files: dist/*
