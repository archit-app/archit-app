<svg xmlns="http://www.w3.org/2000/svg" viewBox="-60 -60 120 120">
  <title>archit.app icon — light</title>
  <desc>Plan-view A with thick Void walls and solid Datum reference handles. Transparent background; intended for light surfaces.</desc>

  <!-- Walls — Void -->
  <g fill="none" stroke="#0C1018" stroke-width="10" stroke-linecap="butt">
    <line x1="0" y1="-45" x2="-38" y2="45"/>
    <line x1="0" y1="-45" x2="38" y2="45"/>
    <line x1="-17" y1="0" x2="-6" y2="0"/>
    <line x1="6" y1="0" x2="17" y2="0"/>
  </g>

  <!-- Reference handles — Datum -->
  <g fill="#F59E0B">
    <rect x="-5" y="-50" width="10" height="10"/>
    <rect x="-43" y="40" width="10" height="10"/>
    <rect x="33" y="40" width="10" height="10"/>
  </g>
</svg>
