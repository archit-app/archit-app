<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" fill="none">
  <title>archit.app — light wordmark</title>

  <!-- A-mark icon (Void walls + Datum handles), centered at (30,30) scale 0.43 -->
  <g transform="translate(30,30) scale(0.43)">
    <g stroke="#0C1018" stroke-width="10" stroke-linecap="butt">
      <line x1="0" y1="-45" x2="-38" y2="45"/>
      <line x1="0" y1="-45" x2="38" y2="45"/>
      <line x1="-17" y1="0" x2="-6" y2="0"/>
      <line x1="6" y1="0" x2="17" y2="0"/>
    </g>
    <g fill="#F59E0B">
      <rect x="-5" y="-50" width="10" height="10"/>
      <rect x="-43" y="40" width="10" height="10"/>
      <rect x="33" y="40" width="10" height="10"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="60" y="38"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="26" font-weight="600" letter-spacing="-0.5"
        fill="#0C1018">archit</text>
  <text x="148" y="38"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="26" font-weight="300" letter-spacing="0"
        fill="#3B82F6">.app</text>
</svg>
